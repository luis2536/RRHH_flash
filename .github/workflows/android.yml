name: Android CI/CD Core Nexus

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    name: Compilación y Verificación de Integridad
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Código Fuente
      uses: actions/checkout@v4

    - name: Configurar Entorno Java (JDK 21)
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: gradle

    - name: Cache de dependencias de Gradle
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/libs.versions.toml') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: Inicializar Archivo de Configuración de Entorno (.env)
      run: |
        if [ -f .env.example ]; then
          cp .env.example .env
          sed -i 's/MY_GEMINI_API_KEY/${{ secrets.GEMINI_API_KEY }}/g' .env
        else
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" > .env
        fi
        echo "Archivo .env inyectado con éxito para compilación segura."

    - name: Verificar y Corregir Permisos del Wrapper de Gradle
      run: |
        if [ -f gradlew ]; then
          chmod +x gradlew
        else
          echo "Wrapper de Gradle no detectado en raíz. Generando wrapper temporal..."
          gradle wrapper
          chmod +x gradlew
        fi

    - name: Ejecutar Compilación de Depuración (assembleDebug)
      run: ./gradlew assembleDebug --no-daemon --stacktrace

    - name: Ejecutar Pruebas Unitarias y de Robolectric
      run: ./gradlew testDebugUnitTest --no-daemon
