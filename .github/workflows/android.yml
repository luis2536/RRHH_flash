name: Android CI/CD Core Nexus

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

# Cancel previous runs for the same branch or PR to save resources
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Compilación y Verificación de Integridad
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Código Fuente
      uses: actions/checkout@v4

    - name: Configurar Entorno Java (JDK 21)
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: 'gradle' # Esto maneja el caché automáticamente de forma óptima

    - name: Inicializar Archivo de Configuración de Entorno (.env)
      run: |
        if [ -f .env.example ]; then
          cp .env.example .env
          sed -i 's/MY_GEMINI_API_KEY/${{ secrets.GEMINI_API_KEY }}/g' .env
        else
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" > .env
        fi
        echo "Archivo .env inyectado con éxito para compilación segura."

    - name: Dar Permisos de Ejecución al Wrapper de Gradle
      run: |
        if [ -f gradlew ]; then
          chmod +x gradlew
        else
          echo "Wrapper de Gradle no detectado en raíz. Generando wrapper temporal..."
          gradle wrapper
          chmod +x gradlew
        fi

    - name: Análisis de Código (Lint)
      run: ./gradlew lintDebug --no-daemon --parallel --build-cache

    - name: Ejecutar Compilación de Depuración (assembleDebug)
      run: ./gradlew assembleDebug --no-daemon --parallel --build-cache --stacktrace

    - name: Ejecutar Pruebas Unitarias y de Robolectric
      run: ./gradlew testDebugUnitTest --no-daemon --parallel --build-cache

    - name: Subir Artifact del APK Generado
      uses: actions/upload-artifact@v4
      with:
        name: app-debug-apk
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 7
